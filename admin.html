<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Dashboard Admin</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1 style="text-align:center">Dashboard Conférence</h1>

<div class="dashboard">

<div class="card">

<h2>Total inscrits</h2>

<p id="total"></p>

</div>

<div class="card">

<h2>Statistiques</h2>

<canvas id="chart"></canvas>

</div>

<div class="card">

<h2>Liste des participants</h2>

<table>

<thead>

<tr>

<th>Nom</th>
<th>Prénom</th>
<th>Email</th>
<th>Téléphone</th>
<th>Date</th>

</tr>

</thead>

<tbody id="table"></tbody>

</table>

</div>

</div>

<script src="admin.js"></script>

</body>
</html>
